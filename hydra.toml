# https://github.com/ory/hydra
name = "hydra"
type = "cli"

[resolve]
git-url = "https://github.com/ory/hydra"

[platform.linux]
download-file = "hydra_{version}-linux_{arch}.tar.gz"
checksum-file = "checksums.txt"

[platform.macos]
download-file = "hydra_{version}-macOS_{arch}.tar.gz"
checksum-file = "checksums.txt"

[platform.windows]
download-file = "hydra_{version}-windows_{arch}.zip"
exe-path = "hydra.exe"
checksum-file = "checksums.txt"

[install]
download-url = "https://github.com/ory/hydra/releases/download/v{version}/{download_file}"
checksum-url = "https://github.com/ory/hydra/releases/download/v{version}/{checksum_file}"

[install.arch]
aarch64 = "arm64"
x86_64 = "64bit"
